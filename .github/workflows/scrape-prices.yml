name: Daily Price Scraper

on:
  schedule:
    # 04:00 UTC = 06:00 Cairo (EGX opens at 10:00 Cairo so morning data is fresh)
    - cron: "0 4 * * *"
  workflow_dispatch:  # allow manual triggering from the Actions tab

permissions:
  contents: write  # needed to commit public_prices.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 psycopg2-binary

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/scrape_prices.py

      - name: Commit price snapshot
        run: |
          git config user.name  "thrivo-bot"
          git config user.email "actions@github.com"
          git add public_prices.json
          # only commit if file actually changed
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily price snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No price changes to commit."
          fi
